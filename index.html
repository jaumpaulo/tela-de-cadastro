<!DOCTYPE html>
<html lang="pt-bt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>login</title>
</head>
<body>
    <div class="main-sing">
            <div class="text-sing">
            <h1>Criar Nova <br>Conta</h1>
            <h2>Já está cadastrado? Faça o Login aqui!</h2>
        </div>
        <div class="card-sing">
            <div class="textfield">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome">
            </div>
            <div class="textfield">
                <label for="email">Email</label>
                <input type="email" name="email" id="email">
            </div>
            <div class="textfield">
                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha">
            </div>
            <button class="btn-sing">Prosseguir</button>
        </div>
    </div>
</body>
</html>
